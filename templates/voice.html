<!DOCTYPE html>
<html lang="kaa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karakalpak Voice Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #07080f;
    --surface:    #0e0f1a;
    --surface2:   #13141f;
    --border:     #1c1d2e;
    --border-hi:  #272840;
    --accent:     #5b8aff;
    --accent-dim: #5b8aff18;
    --accent-mid: #5b8aff40;
    --green:      #00e87a;
    --green-dim:  #00e87a18;
    --red:        #ff4466;
    --red-dim:    #ff446618;
    --text:       #e2e4f0;
    --muted:      #4a4b62;
    --mono:       'JetBrains Mono', monospace;
    --sans:       'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 44px 44px;
    opacity: 0.3;
    pointer-events: none;
  }

  .topbar {
    flex-shrink: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }
  .topbar::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 80px; height: 1px;
    background: var(--accent);
  }
  .logo {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 800;
    color: #fff;
  }
  .logo span { color: var(--accent); }
  .lang-badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--green);
    border: 1px solid #00e87a30;
    padding: 3px 9px;
    border-radius: 2px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    z-index: 1;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    animation: fadeIn 0.5s ease both;
  }
  .welcome-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--accent-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 24px;
    background: var(--accent-dim);
  }
  .welcome h2 {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 10px;
  }
  .welcome p { font-size: 12px; color: var(--muted); line-height: 1.7; max-width: 300px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: msgIn 0.3s ease both;
    max-width: 720px;
  }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; max-width: 75%; }
  .msg.ai   { align-self: flex-start; }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .msg.user .msg-avatar { background: var(--border-hi); color: var(--muted); }
  .msg.ai   .msg-avatar { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-mid); }

  .msg-body { flex: 1; min-width: 0; }
  .msg-time {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 5px;
    display: block;
  }
  .msg.user .msg-time { text-align: right; }

  .msg-bubble {
    padding: 12px 15px;
    border-radius: 3px;
    font-size: 13px;
    line-height: 1.7;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border-hi);
  }
  .msg.ai .msg-bubble {
    background: #0a1220;
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
  }

  .msg-audio {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .play-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: #000;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .play-btn:hover { filter: brightness(1.2); transform: scale(1.05); }
  .play-btn.playing { background: var(--green); }

  .audio-bar {
    flex: 1;
    height: 3px;
    background: var(--border-hi);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .audio-progress {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
  }
  .audio-duration {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 32px;
    text-align: right;
  }

  /* Плашка когда TTS недоступен */
  .tts-warning {
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 2px;
    display: inline-block;
  }

  .typing-dots {
    display: flex; gap: 4px; padding: 4px 0;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  .bottom {
    flex-shrink: 0;
    padding: 16px 24px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .waveform {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    margin-bottom: 14px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .waveform.active { opacity: 1; }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    animation: wave 0.8s ease infinite;
    min-height: 3px;
  }
  .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
  .wave-bar:nth-child(4)  { animation-delay: 0.3s; }
  .wave-bar:nth-child(5)  { animation-delay: 0.15s; }
  .wave-bar:nth-child(6)  { animation-delay: 0.25s; }
  .wave-bar:nth-child(7)  { animation-delay: 0.05s; }
  .wave-bar:nth-child(8)  { animation-delay: 0.35s; }
  .wave-bar:nth-child(9)  { animation-delay: 0.1s; }
  .wave-bar:nth-child(10) { animation-delay: 0.2s; }
  .wave-bar:nth-child(11) { animation-delay: 0.3s; }
  .wave-bar:nth-child(12) { animation-delay: 0.05s; }

  .record-status {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    min-height: 16px;
    transition: color 0.2s;
  }
  .record-status.recording { color: var(--red); }
  .record-status.processing { color: var(--accent); }

  .mic-area {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }

  .mic-btn {
    width: 68px; height: 68px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    transition: all 0.2s;
    position: relative;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 0 var(--accent-mid);
  }
  .mic-btn:hover { filter: brightness(1.15); }
  .mic-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .mic-btn.recording {
    background: var(--red);
    animation: micPulse 1s ease infinite;
  }
  .mic-btn.processing {
    background: var(--muted);
    animation: none;
  }

  .mic-hint {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.08em;
  }

  .timer {
    font-size: 13px;
    font-weight: 500;
    color: var(--red);
    min-width: 40px;
    text-align: center;
    display: none;
  }
  .timer.show { display: block; }

  .clear-btn {
    position: absolute;
    right: 24px; top: 18px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--border-hi); }

  @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes msgIn   { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }
  @keyframes dot     { 0%,60%,100% { transform:scale(1); opacity:0.3 } 30% { transform:scale(1.5); opacity:1 } }
  @keyframes wave    { 0%,100% { height:6px } 50% { height:28px } }
  @keyframes micPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,68,102,0.5) }
    70%  { box-shadow: 0 0 0 16px rgba(255,68,102,0) }
    100% { box-shadow: 0 0 0 0 rgba(255,68,102,0) }
  }

  @media (max-width: 600px) {
    .messages { padding: 14px 16px; }
    .bottom { padding: 14px 16px 20px; }
    .msg.user { max-width: 92%; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Voice<span>···</span>AI</div>
  <div class="lang-badge">Karakalpak</div>
  <button class="clear-btn" onclick="clearChat()">Clear</button>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-ring">🎤</div>
    <h2>Говорите по-каракалпакски</h2>
    <p>Нажмите и удерживайте кнопку микрофона. Отпустите — ответ придёт голосом и текстом.</p>
  </div>
</div>

<div class="bottom">
  <div class="waveform" id="waveform">
    <div class="wave-bar" style="height:8px"></div>
    <div class="wave-bar" style="height:14px"></div>
    <div class="wave-bar" style="height:22px"></div>
    <div class="wave-bar" style="height:18px"></div>
    <div class="wave-bar" style="height:28px"></div>
    <div class="wave-bar" style="height:20px"></div>
    <div class="wave-bar" style="height:12px"></div>
    <div class="wave-bar" style="height:24px"></div>
    <div class="wave-bar" style="height:16px"></div>
    <div class="wave-bar" style="height:28px"></div>
    <div class="wave-bar" style="height:10px"></div>
    <div class="wave-bar" style="height:18px"></div>
  </div>

  <div class="record-status" id="recordStatus">Нажмите на микрофон</div>

  <div class="mic-area">
    <div class="timer" id="timer">0:00</div>
    <button
      class="mic-btn"
      id="micBtn"
      onmousedown="startRecording()"
      onmouseup="stopRecording()"
      ontouchstart="startRecording()"
      ontouchend="stopRecording()"
    >🎤</button>
    <div style="width:40px"></div>
  </div>
  <div class="mic-hint">Удерживай → запись · Отпусти → отправить</div>
</div>

<script>
const API_VOICE = '/api/voice/';

let mediaRecorder  = null;
let audioChunks    = [];
let isRecording    = false;
let timerInterval  = null;
let timerSeconds   = 0;
let stream         = null;

// ── Инициализация микрофона ───────────────────────────────────
async function getMic() {
  if (stream) return stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    return stream;
  } catch (e) {
    alert('Нет доступа к микрофону: ' + e.message);
    return null;
  }
}

// ── Начать запись ─────────────────────────────────────────────
async function startRecording() {
  if (isRecording) return;

  const s = await getMic();
  if (!s) return;

  audioChunks = [];

  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : 'audio/webm';

  mediaRecorder = new MediaRecorder(s, { mimeType });
  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.start(100);
  isRecording = true;

  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micBtn').textContent = '⏹';
  document.getElementById('waveform').classList.add('active');
  setStatus('recording', '● Запись...');
  startTimer();
}

// ── Остановить и отправить ────────────────────────────────────
function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  stopTimer();

  mediaRecorder.stop();
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    audioChunks = [];

    if (blob.size < 1000) {
      resetMicUI();
      return;
    }

    hideWelcome();
    appendUserAudio(blob);

    setStatus('processing', '◌ Обработка...');
    document.getElementById('micBtn').classList.add('processing');
    document.getElementById('micBtn').disabled = true;

    const typingId = showTyping();

    try {
      const form = new FormData();
      form.append('audio', blob, 'question.webm');

      const resp = await fetch(API_VOICE, {
        method: 'POST',
        body:   form,
      });

      const data = await resp.json();
      removeTyping(typingId);

      if (resp.ok) {
        const msgId = appendAIMessage(data.answer_text, data.audio_url, data.tts_warning);
        if (data.audio_url && msgId) autoPlay(data.audio_url, msgId);
      } else {
        appendError(data.detail || 'Серверде қате');
      }
    } catch (e) {
      removeTyping(typingId);
      appendError('Network error: ' + e.message);
    } finally {
      resetMicUI();
    }
  };
}

// ── Рендеринг сообщений ───────────────────────────────────────
function appendUserAudio(blob) {
  const url  = URL.createObjectURL(blob);
  const time = now();
  const id   = 'user-' + Date.now();
  const div  = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">YOU</div>
    <div class="msg-body">
      <span class="msg-time">${time}</span>
      <div class="msg-bubble">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">🎤 Аудио сообщение</div>
        ${buildPlayer(url, id, true)}
      </div>
    </div>
  `;
  msgs().appendChild(div);
  scrollBottom();
  // Инициализируем плеер после добавления в DOM
  initPlayer(id);
}

function appendAIMessage(text, audioUrl, ttsWarning) {
  const time = now();
  const id   = 'ai-' + Date.now();
  const div  = document.createElement('div');
  div.className = 'msg ai';
  let audioBlock = '';
  if (audioUrl) {
    // ФИКС: не хардкодим хост — берём текущий origin или используем относительный URL
    const fullUrl = audioUrl.startsWith('http') ? audioUrl : (window.location.origin + audioUrl);
    audioBlock = buildPlayer(fullUrl, id, false);
  } else if (ttsWarning) {
    audioBlock = `<div class="tts-warning">🔇 Аудио недоступно (TTS офлайн) — только текст</div>`;
  }

  div.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <span class="msg-time">${time}</span>
      <div class="msg-bubble">
        <div style="margin-bottom:${audioUrl ? 10 : 0}px">${esc(text)}</div>
        ${audioBlock}
      </div>
    </div>
  `;
  msgs().appendChild(div);
  scrollBottom();

  // Инициализируем плеер после добавления в DOM
  if (audioUrl) initPlayer(id);
  return id;
}

function appendError(msg) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <div class="msg-bubble" style="border-left-color:var(--red);background:var(--red-dim)">
        ⚠ ${esc(msg)}
      </div>
    </div>
  `;
  msgs().appendChild(div);
  scrollBottom();
}

// ── Кастомный плеер ───────────────────────────────────────────
// isBlob=true → src ставится прямо на <audio> (blob URL не работают через <source>)
// isBlob=false → src тоже напрямую, просто с preload=auto для серверных файлов
function buildPlayer(src, id, isBlob) {
  return `
    <div class="msg-audio" id="player-${id}">
      <button class="play-btn" id="playbtn-${id}" onclick="togglePlay('${id}')">▶</button>
      <div class="audio-bar" onclick="seekAudio(event,'${id}')">
        <div class="audio-progress" id="prog-${id}"></div>
      </div>
      <span class="audio-duration" id="dur-${id}">--:--</span>
      <audio id="aud-${id}"
        src="${src}"
        preload="${isBlob ? 'auto' : 'auto'}"
        ontimeupdate="onProgress('${id}')"
        onended="onEnded('${id}')">
      </audio>
    </div>
  `;
}

// ФИКС: инициализация плеера — вешаем события после добавления в DOM
function initPlayer(id) {
  const aud = document.getElementById('aud-' + id);
  if (!aud) return;

  const dur = document.getElementById('dur-' + id);

  // Пробуем получить длительность несколькими способами
  function trySetDuration() {
    if (aud.duration && isFinite(aud.duration) && aud.duration > 0) {
      dur.textContent = fmtTime(aud.duration);
      return true;
    }
    return false;
  }

  aud.addEventListener('loadedmetadata', () => trySetDuration());
  aud.addEventListener('loadeddata', () => trySetDuration());
  aud.addEventListener('canplay', () => trySetDuration());
  aud.addEventListener('durationchange', () => trySetDuration());

  // Принудительно загружаем
  aud.load();
}

function togglePlay(id) {
  const aud = document.getElementById('aud-' + id);
  const btn = document.getElementById('playbtn-' + id);
  if (!aud) return;

  // Останавливаем все остальные
  document.querySelectorAll('audio').forEach(a => {
    if (a !== aud) { a.pause(); }
  });
  document.querySelectorAll('.play-btn').forEach(b => {
    if (b !== btn) { b.textContent = '▶'; b.classList.remove('playing'); }
  });

  if (aud.paused) {
    aud.play().catch(e => console.warn('Play error:', e));
    btn.textContent = '⏸';
    btn.classList.add('playing');
  } else {
    aud.pause();
    btn.textContent = '▶';
    btn.classList.remove('playing');
  }
}

function onProgress(id) {
  const aud  = document.getElementById('aud-' + id);
  const prog = document.getElementById('prog-' + id);
  const dur  = document.getElementById('dur-' + id);
  if (!aud || !prog) return;

  // ФИКС: проверяем что duration конечное число перед делением
  if (aud.duration && isFinite(aud.duration) && aud.duration > 0) {
    const pct = (aud.currentTime / aud.duration) * 100;
    prog.style.width = pct + '%';
    // Показываем текущее время / общее время
    dur.textContent = fmtTime(aud.currentTime) + ' / ' + fmtTime(aud.duration);
  } else {
    dur.textContent = fmtTime(aud.currentTime);
  }
}

function onEnded(id) {
  const btn  = document.getElementById('playbtn-' + id);
  const prog = document.getElementById('prog-' + id);
  const aud  = document.getElementById('aud-' + id);
  const dur  = document.getElementById('dur-' + id);
  if (btn)  { btn.textContent = '▶'; btn.classList.remove('playing'); }
  if (prog) prog.style.width = '0%';
  // Восстанавливаем отображение полной длины
  if (aud && dur && isFinite(aud.duration)) dur.textContent = fmtTime(aud.duration);
}

function seekAudio(e, id) {
  const aud = document.getElementById('aud-' + id);
  const bar = e.currentTarget;
  if (!aud || !aud.duration || !isFinite(aud.duration)) return;
  const rect = bar.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  aud.currentTime = Math.max(0, Math.min(pct * aud.duration, aud.duration));
}

function autoPlay(audioUrl, id) {
  setTimeout(() => {
    const aud = document.getElementById('aud-' + id);
    const btn = document.getElementById('playbtn-' + id);
    if (!aud) return;
    aud.play().catch(e => console.warn('autoPlay error:', e));
    if (btn) { btn.textContent = '⏸'; btn.classList.add('playing'); }
  }, 500);
}

// ── Typing indicator ──────────────────────────────────────────
function showTyping() {
  const id  = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  `;
  msgs().appendChild(div);
  scrollBottom();
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

// ── Timer ─────────────────────────────────────────────────────
function startTimer() {
  timerSeconds = 0;
  const el = document.getElementById('timer');
  el.classList.add('show');
  timerInterval = setInterval(() => {
    timerSeconds++;
    el.textContent = fmtTime(timerSeconds);
    if (timerSeconds >= 60) stopRecording();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer').classList.remove('show');
}

// ── UI helpers ────────────────────────────────────────────────
function resetMicUI() {
  document.getElementById('micBtn').classList.remove('recording', 'processing');
  document.getElementById('micBtn').disabled  = false;
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('waveform').classList.remove('active');
  setStatus('', 'Нажмите на микрофон');
}

function setStatus(cls, text) {
  const el = document.getElementById('recordStatus');
  el.className  = 'record-status' + (cls ? ' ' + cls : '');
  el.textContent = text;
}

function hideWelcome() {
  document.getElementById('welcome')?.remove();
}

function msgs() { return document.getElementById('messages'); }

function scrollBottom() {
  const m = msgs();
  m.scrollTop = m.scrollHeight;
}

function clearChat() {
  msgs().innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-ring">🎤</div>
      <h2>Говорите по-каракалпакски</h2>
      <p>Нажмите и удерживайте кнопку микрофона. Отпустите — ответ придёт голосом и текстом.</p>
    </div>
  `;
}

function fmtTime(s) {
  if (!s || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function now() {
  return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

document.getElementById('micBtn').addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
